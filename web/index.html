<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIALACTEE Controller</title>
    <style>
        :root {
            --ios-blue: #0A84FF;
            --ios-orange: #FF9F0A;
            --ios-red: #FF453A;
            --ios-green: #32D74B;
            --dark-bg: #000000;
            --card-bg: #1C1C1E;
            --card-hover: #2C2C2E;
            --glass-bg: rgba(28, 28, 30, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: var(--dark-bg); 
            color: #FFFFFF; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .header { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 16px 20px; 
            box-sizing: border-box; 
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--glass-border); 
            margin-bottom: 24px; 
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .status-dot { 
            width: 12px; 
            height: 12px; 
            border-radius: 50%; 
            background-color: var(--ios-red); 
            transition: background-color 0.3s ease; 
        }
        .status-dot.connected { 
            background-color: var(--ios-green); 
        }

        h1 { 
            text-align: center; 
            font-size: 20px; 
            font-weight: 600; 
            margin: 0; 
            flex-grow: 1; 
            letter-spacing: 0.5px; 
            color: #fff;
        }

        .page { 
            display: none; 
            width: 100%; 
            max-width: 500px; 
            padding: 0 20px 40px; 
            box-sizing: border-box; 
            flex-direction: column; 
            gap: 16px; 
        }
        #page-configuration {
            max-width: 900px;
        }
        .page.active { display: flex; animation: fadeIn 0.3s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        button { 
            background: var(--card-bg);
            color: white; 
            border: none; 
            padding: 16px 20px; 
            font-size: 17px; 
            font-weight: 500;
            border-radius: 14px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
        }
        button:active { 
            transform: scale(0.97); 
            background: var(--card-hover);
        }

        .btn-shot { 
            background: var(--ios-red); 
            font-size: 22px; 
            font-weight: 600;
            padding: 24px;
            color: #fff;
        }
        .btn-shot:active { 
            background: #d93930; 
        }

        .back-btn { 
            background: transparent; 
            color: var(--ios-blue);
            font-size: 17px; 
            padding: 8px 0; 
            margin-bottom: 8px; 
            width: fit-content; 
            display: flex;
            align-items: center;
        }
        .back-btn:active {
            background: transparent;
            opacity: 0.6;
        }

        .slider-container { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 14px; 
        }

        label {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            display: flex; 
            justify-content: space-between;
        }

        label span {
            color: var(--ios-blue);
        }

        input[type="range"] { 
            -webkit-appearance: none;
            width: 100%; 
            background: #3a3a3c;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        h2 { 
            margin-top: 0; 
            font-size: 28px;
            font-weight: 700;
            color: #fff; 
        }

        /* --- STAGE GRID (REAL COORDINATES) --- */
        .stage-container {
            position: relative;
            width: 100%;
            aspect-ratio: 862 / 726;
            margin-top: 10px;
            background-color: var(--card-bg);
            border-radius: 20px;
        }
        
        .seg-abs {
            position: absolute;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .seg-abs:active {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Pending State (Waiting for Transition) */
        .seg-abs.pending {
            border-color: var(--ios-orange);
            background: rgba(255, 159, 10, 0.15);
        }
        
        .seg-abs.pending .mode-txt {
            color: var(--ios-orange);
            background: rgba(255, 159, 10, 0.1);
            border-color: rgba(255, 159, 10, 0.3);
        }

        .seg-abs .mode-txt {
            color: #EBEBF5;
            font-size: 9px;
            font-weight: 500;
            white-space: nowrap;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.4);
            padding: 3px 6px;
            border-radius: 10px;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        /* Adjustments for vertical text layout */
        .vert span {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }
        
        .vert .mode-txt {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            max-height: 85%;
            max-width: 100%;
        }

        /* Horizontal segments (6% thickness) */
        .s-h00 { left: 0%; top: 12%; width: 50%; height: 6%; }
        .s-h11 { left: 50%; top: 25%; width: 14%; height: 6%; }
        .s-h10 { left: 50%; top: 65%; width: 14%; height: 6%; }
        .s-h20 { left: 64%; top: 12%; width: 18%; height: 6%; }
        .s-h32 { left: 82%; top: 0%; width: 18%; height: 6%; }
        .s-h31 { left: 88%; top: 28%; width: 6%; height: 6%; }
        .s-h30 { left: 88%; top: 55%; width: 6%; height: 6%; }

        /* Vertical segments (6% thickness) */
        .s-v1  { left: 44%; top: 18%; width: 6%; height: 53%; }
        .s-v2  { left: 64%; top: 18%; width: 6%; height: 53%; }
        .s-v3  { left: 82%; top: 6%; width: 6%; height: 55%; }
        .s-v4  { left: 94%; top: 6%; width: 6%; height: 55%; }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: flex-end; z-index: 100;
            padding-bottom: 40px;
        }
        .modal-overlay.active { display: flex; animation: slideUp 0.3s ease-out; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-content {
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 24px; 
            width: 90%; 
            max-width: 400px;
            max-height: 80vh; 
            overflow-y: auto;
        }
        .modal-content h3 { margin-top: 0; color: #fff; text-align: center; font-size: 20px; font-weight: 600; }
        .mode-btn { 
            margin-bottom: 8px; 
            width: 100%; 
            background: rgba(255,255,255,0.05); 
            border-radius: 12px;
            font-size: 16px;
            padding: 14px;
        }
        .mode-btn:active { background: var(--ios-blue); color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <div style="width: 16px;"></div> <!-- Spacer -->
        <h1>VIALACTEE</h1>
        <div id="statusLight" class="status-dot"></div>
    </div>

    <!-- MAIN MENU -->
    <div id="page-main" class="page active">
        <button class="btn-shot" onclick="sendMsg('special:Shot')">SHOT</button>
        <button onclick="nav('playlists')">Playlists</button>
        <button onclick="nav('configuration')">Configuration live</button>
        <button onclick="nav('parametres')">Paramètres</button>
    </div>

    <!-- PLAYLISTS -->
    <div id="page-playlists" class="page">
        <button class="back-btn" onclick="nav('main')">← Retour</button>
        <h2>Playlists</h2>
        <p style="color: #888; text-align: center; font-style: italic;">Les playlists seront bientôt disponibles ici.</p>
    </div>

    <!-- CONFIGURATION -->
    <div id="page-configuration" class="page">
        <button class="back-btn" onclick="nav('main')">← Retour</button>
        <h2 style="font-size: 18px; margin-bottom: 0;">Configuration Live</h2>
        
        <div class="stage-container">
            <div class="seg-abs s-h00" onclick="openModeMenu('Segment h00')"><div id="mode-h00" class="mode-txt">--</div></div>
            
            <div class="seg-abs vert s-v1" onclick="openModeMenu('Segment v1')"><div id="mode-v1" class="mode-txt">--</div></div>
            <div class="seg-abs vert s-v2" onclick="openModeMenu('Segment v2')"><div id="mode-v2" class="mode-txt">--</div></div>
            
            <div class="seg-abs s-h10" onclick="openModeMenu('Segment h10')"><div id="mode-h10" class="mode-txt">--</div></div>
            <div class="seg-abs s-h11" onclick="openModeMenu('Segment h11')"><div id="mode-h11" class="mode-txt">--</div></div>
            <div class="seg-abs s-h20" onclick="openModeMenu('Segment h20')"><div id="mode-h20" class="mode-txt">--</div></div>
            
            <div class="seg-abs vert s-v3" onclick="openModeMenu('Segment v3')"><div id="mode-v3" class="mode-txt">--</div></div>
            <div class="seg-abs vert s-v4" onclick="openModeMenu('Segment v4')"><div id="mode-v4" class="mode-txt">--</div></div>
            
            <div class="seg-abs s-h30" onclick="openModeMenu('Segment h30')"><div id="mode-h30" class="mode-txt">--</div></div>
            <div class="seg-abs s-h31" onclick="openModeMenu('Segment h31')"><div id="mode-h31" class="mode-txt">--</div></div>
            <div class="seg-abs s-h32" onclick="openModeMenu('Segment h32')"><div id="mode-h32" class="mode-txt">--</div></div>
        </div>

        <div style="text-align: center; margin-top: 30px; height: 60px;">
            <button id="transitionBtn" onclick="applyTransitions()" style="display: none; width: 100%; background: var(--ios-blue); font-size: 17px; font-weight: 600;">Valider la Transition</button>
        </div>
    </div>

    <!-- MODAL POUR CHOIX DE MODE -->
    <div id="modeModal" class="modal-overlay" onclick="closeModeMenu(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modalTitle">Choisir un mode</h3>
            <div id="modeList"></div>
            <button onclick="closeModeMenu()" style="width: 100%; margin-top: 15px; background: rgba(255,255,255,0.1); color: var(--ios-red);">Annuler</button>
        </div>
    </div>

    <!-- PARAMETRES -->
    <div id="page-parametres" class="page">
        <button class="back-btn" onclick="nav('main')">← Retour</button>
        <h2>Paramètres</h2>
        
        <div class="slider-container" id="container-lum" style="--glow-val: 50;">
            <label>Luminosité <span id="lumVal">50</span></label>
            <input type="range" id="lumSlider" min="0" max="100" value="50" oninput="updateParam('luminosite', this.value, 'lumVal', 'container-lum')">
        </div>

        <div class="slider-container" id="container-sens" style="--glow-val: 50;">
            <label>Sensibilité <span id="sensVal">50</span></label>
            <input type="range" id="sensSlider" min="0" max="100" value="50" oninput="updateParam('sensibilite', this.value, 'sensVal', 'container-sens')">
        </div>

        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button style="flex: 1; font-size: 14px;" onclick="sendMsg('calibration:audio:start')">Start Calibration</button>
            <button style="flex: 1; font-size: 14px;" onclick="sendMsg('calibration:audio:end')">End Calibration</button>
        </div>
    </div>

    <script>
        let ws;
        const statusLight = document.getElementById('statusLight');

        function connectWS() {
            ws = new WebSocket(`ws://${window.location.host}/ws`);
            
            ws.onopen = () => {
                statusLight.classList.add('connected');
                sendMsg('yo la team');
            };
            
            ws.onclose = () => {
                statusLight.classList.remove('connected');
                setTimeout(connectWS, 2000); 
            };

            ws.onerror = () => {
                statusLight.classList.remove('connected');
                ws.close();
            };

            ws.onmessage = (event) => {
                if (event.data === "pong") {
                    // Ping OK
                } else if (event.data.startsWith("[")) {
                    // We received the array of modes for all segments
                    try {
                        // The string is likely a python list representation like "['Mode1', 'Mode2']"
                        // Convert it to valid JSON if necessary by replacing single quotes with double quotes
                        let jsonStr = event.data.replace(/'/g, '"');
                        let modes = JSON.parse(jsonStr);
                        
                        const segmentIds = ["h00", "v1", "h10", "h11", "v2", "h20", "v3", "h30", "h31", "h32", "v4"];
                        for(let i=0; i<modes.length && i<segmentIds.length; i++) {
                            let segName = "Segment " + segmentIds[i];
                            let div = document.getElementById(`mode-${segmentIds[i]}`);
                            // Only overwrite UI if there is no pending change for this segment
                            if(div && !pendingChanges[segName]) {
                                div.innerText = modes[i];
                            }
                        }
                    } catch (e) {
                        console.error("Could not parse configuration:", event.data, e);
                    }
                }
            };
        }

        function sendMsg(msg) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(msg);
            }
        }

        setInterval(() => {
            sendMsg('ping');
        }, 2000);

        // Navigation
        let currentPage = 'Main';
        function nav(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            
            const pageNames = {
                'main': 'Main',
                'playlists': 'Playlists',
                'configuration': 'Configuration',
                'parametres': 'Parametres'
            };
            
            sendMsg(`chgpage:leave:${currentPage}`);
            if (pageNames[pageId]) {
                currentPage = pageNames[pageId];
                sendMsg(`chgpage:enter:${currentPage}`);
            }
        }

        // --- GRID MAPPER LOGIC ---
        let currentTargetSegment = "";
        let pendingChanges = {}; // Stores segmentName -> mode
        const availableModes = ["Rainbow", "Shining Stars", "Power Bar", "Bille", "Pulse", "Fixed Color", "Strobe", "Eteindre"];
        
        function openModeMenu(segmentName) {
            currentTargetSegment = segmentName;
            document.getElementById('modalTitle').innerText = segmentName;
            
            const modeList = document.getElementById('modeList');
            modeList.innerHTML = '';
            
            availableModes.forEach(mode => {
                let btn = document.createElement('button');
                btn.className = 'mode-btn';
                btn.innerText = mode;
                btn.onclick = () => selectMode(mode);
                modeList.appendChild(btn);
            });
            
            document.getElementById('modeModal').classList.add('active');
        }

        function closeModeMenu(e) {
            if(e && e.target !== document.getElementById('modeModal')) return;
            document.getElementById('modeModal').classList.remove('active');
        }

        function selectMode(mode) {
            // Queue the change locally instead of sending it immediately
            pendingChanges[currentTargetSegment] = mode;
            
            // Update UI locally instantly to show pending state
            let shortName = currentTargetSegment.split(' ')[1]; // "Segment h00" -> "h00"
            let div = document.getElementById(`mode-${shortName}`);
            let container = div ? div.parentElement : null;
            
            if(div) div.innerText = mode;
            if(container) container.classList.add('pending');
            
            // Show the massive TRANSITION button
            document.getElementById('transitionBtn').style.display = 'block';
            document.getElementById('modeModal').classList.remove('active');
        }

        function applyTransitions() {
            // Fire all pending changes instantly
            for (const [segment, mode] of Object.entries(pendingChanges)) {
                sendMsg(`chgmode:${segment}:${mode}`);
                
                // Remove pending styling
                let shortName = segment.split(' ')[1];
                let div = document.getElementById(`mode-${shortName}`);
                if(div && div.parentElement) {
                    div.parentElement.classList.remove('pending');
                }
            }
            
            // Clear queue and hide button
            pendingChanges = {};
            document.getElementById('transitionBtn').style.display = 'none';
        }

        // Dynamic Glow & Value Update
        function updateParam(name, value, labelId, containerId) {
            // Update Text
            document.getElementById(labelId).innerText = value;
            
            // Update the CSS Variable for the dynamic glow effect
            const container = document.getElementById(containerId);
            if(container) {
                container.style.setProperty('--glow-val', value);
            }

            // Send to Raspberry Pi
            sendMsg(`chgparam:${name}:${value}`);
        }

        connectWS();
    </script>
</body>
</html>
